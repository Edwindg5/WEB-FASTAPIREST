version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: cafe_monitoring_db
    environment:
      POSTGRES_USER: cafe_user
      POSTGRES_PASSWORD: cafe_secure_password_123
      POSTGRES_DB: cafe_monitoring_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafe_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Web
  api-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cafe_api_web
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cafe_user:cafe_secure_password_123@postgres:5432/cafe_monitoring_db
      SECRET_KEY: ${SECRET_KEY:-cambiar-esta-clave-en-produccion}
      DEBUG: "False"
      FRONTEND_URL: http://localhost:4200
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  # Redis (opcional, para caching/rate-limiting)
  redis:
    image: redis:7-alpine
    container_name: cafe_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
